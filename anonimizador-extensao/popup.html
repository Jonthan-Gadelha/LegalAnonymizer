<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonimizador de Processos</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <header>
        <h1>🔒 Anonimizador LexMind</h1>
        <p>Processos Sigilosos e em Segredo de Justiça</p>
    </header>

    <main>
        <section class="input-section">
            <div class="file-upload">
                <label for="file-input" class="file-label">
                    📁 Selecionar Arquivo (TXT, HTML, PDF)
                    <input type="file" id="file-input" accept=".txt,.html,.htm,.pdf" hidden>
                </label>
            </div>

            <div class="text-area-container">
                <label for="text-input">Ou cole o texto aqui:</label>
                <textarea id="text-input" placeholder="Cole o texto do processo judicial aqui...&#10;&#10;Exemplo:&#10;João Silva, CPF: 123.456.789-10&#10;Endereço: Rua das Flores, 123&#10;OAB/PE: 29561"></textarea>
            </div>

            <div class="button-group">
                <button id="anonymize-btn" class="btn btn-primary">🔒 Anonimizar</button>
                <button id="clear-btn" class="btn btn-secondary">🗑️ Limpar</button>
            </div>
        </section>

        <div id="progress-section" class="progress-section" style="display: none;">
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <p id="progress-text">Processando...</p>
        </div>

        <div id="ocr-warning" class="ocr-warning" style="display: none;">
            <h3>⚠️ Aviso de OCR</h3>
            <p>Este PDF contém páginas de imagem que precisam de OCR.</p>
            <div class="button-group">
                <button id="proceed-ocr-btn" class="btn btn-primary">Continuar com OCR</button>
                <button id="skip-ocr-btn" class="btn btn-secondary">Pular OCR</button>
            </div>
        </div>

        <section id="stats" class="stats-section" style="display: none;">
            <h3>📊 Estatísticas</h3>
            <p><strong><span id="stats-count">0</span></strong> dados sensíveis removidos</p>
        </section>

        <section id="result-section" class="result-section" style="display: none;">
            <h3>✅ Texto Anonimizado</h3>
            <textarea id="result-text" readonly></textarea>
            <div class="button-group">
                <button id="copy-btn" class="btn btn-success">📋 Copiar</button>
                <button id="download-btn" class="btn btn-success">💾 Baixar</button>
            </div>
        </section>
    </main>

    <footer>
        <p>v1.0.0 | Jonathan Gadelha | CNJ nº 615/2025</p>
    </footer>

    <script src="anonymizer.js"></script>
    <script src="lib/pdf.min.js"></script>
    <script src="lib/pdf.worker.min.js"></script>
    <script src="lib/tesseract.min.js"></script>
    <script src="pdf-processor.js"></script>
    <script src="ocr-processor.js"></script>
    <script src="popup.js"></script>
</body>
</html>
